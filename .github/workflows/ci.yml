name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Static checks and tests
        run: npm run check

  governance:
    name: repo-governance-e2e
    uses: Andrewlislin/repo-governance/.github/workflows/governance.yml@54ae36849b6ee7947d705e7636bfb1d6a6227833
    permissions:
      contents: read
      pull-requests: read
    with:
      comment: false
