name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Static checks and tests
        run: npm run check
      - name: Build self-contained CLI and dispatcher
        run: npm run build:sea
      - name: Verify executables without PATH or a global Node runtime
        shell: bash
        run: |
          set -euo pipefail
          cli="$PWD/dist/repo-governance"
          dispatcher="$PWD/dist/dispatcher"
          env PATH= "$cli" version --json
          temporary_repository="$(mktemp -d)"
          set +e
          dispatcher_output="$(cd "$temporary_repository" && env PATH= "$dispatcher" 2>&1)"
          dispatcher_status=$?
          set -e
          test "$dispatcher_status" = "2"
          test "$dispatcher_output" = "Repository is not initialized. Run repo-governance init before the first push."

  governance:
    name: repo-governance-e2e
    uses: Andrewlislin/repo-governance/.github/workflows/governance.yml@d086cca61402e6fd416922787dc1665679368001
    permissions:
      contents: read
      pull-requests: read
