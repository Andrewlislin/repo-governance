name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js 22
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Static checks and tests
        run: npm run check
      - name: Build self-contained CLI and version-aware launcher
        run: npm run build:sea
      - name: Verify executables without PATH or a global Node runtime
        shell: bash
        run: |
          set -euo pipefail
          cli="$PWD/dist/repo-governance"
          launcher="$PWD/dist/dispatcher"
          env PATH= "$cli" version --json
          temporary_repository="$(mktemp -d)"
          set +e
          launcher_output="$(cd "$temporary_repository" && env PATH= "$launcher" 2>&1)"
          launcher_status=$?
          set -e
          test "$launcher_status" = "2"
          test "$launcher_output" = "No default engine is configured. Install a verified repo-governance release first."

  governance:
    name: repo-governance-e2e
    if: github.event_name == 'pull_request'
    uses: CoaseEdge/repo-governance/.github/workflows/governance.yml@3c627d8f294b328cd7a44a5a6edfb8a923657e3a
    permissions:
      contents: read
      pull-requests: read
