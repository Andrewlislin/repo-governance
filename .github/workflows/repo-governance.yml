# repo-governance engine 1.3.0
name: Repo Governance

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      report-artifact: ${{ steps.governance.outputs.report-artifact }}
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          clean: true
          persist-credentials: false
      - name: Set up Node.js 22
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22
      - name: Run governed validation
        id: governance
        uses: CoaseEdge/repo-governance/action@8b701d357f10f0e805724efe1b7e95c6875258ec
        with:
          profile: pr-validation
          event-file: ${{ github.event_path }}
          engine-commit-sha: 8b701d357f10f0e805724efe1b7e95c6875258ec
