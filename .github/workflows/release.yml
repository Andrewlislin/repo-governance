name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build-${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-14
            platform: darwin-arm64
          - os: windows-latest
            platform: win32-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install and test
        run: npm ci && npm run check
      - name: Build self-contained executables
        run: npm run build:sea
        env:
          REPO_GOVERNANCE_BUILD_SHA: ${{ github.sha }}
      - name: Package release directory
        run: npm run package:release
        env:
          REPO_GOVERNANCE_BUILD_SHA: ${{ github.sha }}
          REPO_GOVERNANCE_PLATFORM: ${{ matrix.platform }}
      - name: Attest CLI executable
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: release/${{ matrix.platform }}/repo-governance${{ runner.os == 'Windows' && '.exe' || '' }}
      - name: Attest stable dispatcher
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: release/${{ matrix.platform }}/dispatcher${{ runner.os == 'Windows' && '.exe' || '' }}
      - name: Attest release manifest and Skill tree digest
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: release/${{ matrix.platform }}/release-manifest.json
      - name: Upload platform bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: repo-governance-${{ matrix.platform }}
          path: release/${{ matrix.platform }}
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download attested platform bundles
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release
          pattern: repo-governance-*
      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/**/* --verify-tag --title "$GITHUB_REF_NAME" --generate-notes
