name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build-${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-14
            platform: darwin-arm64
          - os: windows-latest
            platform: win32-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node.js 22
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - name: Install and test
        run: npm ci && npm run check
      - name: Build self-contained executables
        run: npm run build:sea
        env:
          REPO_GOVERNANCE_BUILD_SHA: ${{ github.sha }}
      - name: Package release directory
        run: npm run package:release
        env:
          REPO_GOVERNANCE_BUILD_SHA: ${{ github.sha }}
          REPO_GOVERNANCE_PLATFORM: ${{ matrix.platform }}
      - name: Attest CLI executable
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: release/${{ matrix.platform }}/repo-governance${{ runner.os == 'Windows' && '.exe' || '' }}
      - name: Attest stable dispatcher
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: release/${{ matrix.platform }}/dispatcher${{ runner.os == 'Windows' && '.exe' || '' }}
      - name: Attest release manifest and Skill tree digest
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: release/${{ matrix.platform }}/release-manifest.json
      - name: Upload platform bundle
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: repo-governance-${{ matrix.platform }}
          path: release/${{ matrix.platform }}
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download attested platform bundles
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          path: release
          pattern: repo-governance-*
      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/**/* --verify-tag --title "$GITHUB_REF_NAME" --generate-notes
